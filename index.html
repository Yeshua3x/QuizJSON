<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
      .option {
    display: block; /* Exibe cada opção em uma nova linha */
    margin-bottom: 10px; /* Espaço entre opções */
      }
        /* Adicione seu estilo aqui, se necessário */
    </style>
</head>
<body>
    <div id="quizbox">
        <div id="question">Carregando...</div>
        <div id="options"></div>
        <button id="submit">Enviar</button>
        <div id="result" style="display: none;"></div>
    </div>

    <audio id="correct-sound" src="correct.mp3" preload="auto"></audio>
    <audio id="wrong-sound" src="wrong.mp3" preload="auto"></audio>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let phase = 0;

        async function fetchQuizData() {
            const response = await fetch('quiz.json');
            return await response.json();
        }

        function loadPhase(phaseData) {
            quizData = phaseData;
            currentQuestionIndex = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            currentQuestion.options.forEach(option => {
                const label = document.createElement('label');
                label.classList.add('option');
                label.innerHTML = `
                    <input type="radio" name="options" value="${option}" style="display:none;" /> ${option}
                `;
                optionsDiv.appendChild(label);
            });
        }

        document.getElementById('submit').addEventListener('click', function() {
            const selectedOption = document.querySelector('input[name="options"]:checked');
            if (selectedOption) {
                const isCorrect = selectedOption.value === quizData[currentQuestionIndex].answer;
                if (isCorrect) {
                    score++;
                    document.getElementById('correct-sound').play();
                } else {
                    document.getElementById('wrong-sound').play();
                }
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    if (phase < 2) { // Corrigido para verificar se não está na última fase
                        phase++;
                        loadNextPhase();
                    } else {
                        displayFinalResult();
                    }
                }
            } else {
                alert('Selecione uma opção!');
            }
        });

        function loadNextPhase() {
            fetchQuizData().then(data => {
                const phases = [data.phase1, data.phase2, data.phase3];
                loadPhase(phases[phase]);
            });
        }

        function displayFinalResult() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <h3>Parabéns!</h3>
                <p>Você acertou ${score} de ${2 * (phase + 1)} perguntas!</p>
            `;
            document.getElementById('quizbox').style.display = 'none'; // Oculta o quiz
            resultDiv.style.display = 'block'; // Exibe o resultado
        }

        fetchQuizData().then(data => {
            const phases = [data.phase1, data.phase2, data.phase3];
            loadPhase(phases[phase]); // Carrega a fase inicial
        });
    </script>
</body>
</html>
