<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Geografia</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 20px;
        }
        #quizbox {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: auto;
        }
        #question {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .option {
            display: block;
            margin: 5px 0;
        }
        #submit {
            padding: 10px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #submit:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="quizbox">
        <div id="question">Carregando...</div>
        <div id="options"></div>
        <button id="submit">Enviar</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;

        async function fetchQuizData() {
            const response = await fetch('quiz.json');
            return await response.json();
        }

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = ''; // Limpa opções anteriores

            currentQuestion.options.forEach(option => {
                const label = document.createElement('label');
                label.classList.add('option');
                label.innerHTML = `
                    <input type="radio" name="options" value="${option}" /> ${option}
                `;
                optionsDiv.appendChild(label);
            });
        }

        document.getElementById('submit').addEventListener('click', function() {
            const selectedOption = document.querySelector('input[name="options"]:checked');
            if (selectedOption) {
                if (selectedOption.value === quizData[currentQuestionIndex].answer) {
                    score++;
                }
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    displayResult();
                }
            } else {
                alert('Selecione uma opção!');
            }
        });

        function displayResult() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <h3>Resultado</h3>
                <p>Você acertou ${score} de ${quizData.length} perguntas!</p>
            `;
            document.getElementById('quizbox').style.display = 'none'; // Oculta o quiz
        }

        fetchQuizData().then(data => {
            quizData = data;
            loadQuestion(); // Carrega a primeira pergunta
        });
    </script>
</body>
</html>
